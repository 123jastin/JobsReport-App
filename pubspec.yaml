name: jobs_report
description: "Jobs Report & Career Guide client converted to Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  dio: ^5.4.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  share_plus: ^7.2.1
  cached_network_image: ^3.3.1
  flutter_html: ^3.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
